<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <title>ShopForGood</title>
  </head>

  <body>

            <div class='jumbotron'>
              <div class="row">
                <div class="col-sm-8">
                  <h1> Shop For Good</h1>
                </div>
                <div class="col-sm-4">


                  <img class="img-responsive" src='https://genhq.com/wp-content/uploads/2018/02/CharitibleGiving.gif'>
                </div>
                <form role='form'>
                  <label for="email"> Find out more</label>
                  <input type="text" name="email" >
                  <button class="btn btn-success" type="submit">Search</button>
                </form>
              </div>
            </div>



            <div class="slideshow-container">
            <div class="mySlides">
              <div class="numbertext">1 / 3</div>
              <img src="https://econsultancy.imgix.net/content/uploads/2018/01/05151122/ROW-50-charity.png" style="width:100%">
              <div class="text"> By using the money we earn, all of it goes to charity for a better world</div>
            </div>

            <div class="mySlides">
              <div class="numbertext">2 / 3</div>
              <img src="https://leadership.saportareport.com/povertyandequity/files/2017/10/nonprofit-charity.jpg" style="width:100%">
              <div class="text">Non-profit chains like ours are doing the best we can for our world. Help us out by choosing our store over others</div>
            </div>

            <div class="mySlides">
              <div class="numbertext">3 / 3</div>
              <img src="https://blog-cdn.classy.org/blog/wp-content/uploads/2014/05/04173757/blog_25-fundraising-ideas_v3.png" style="width:100%">
              <div class="text1">Join our fun-run to raise more money for local animal shelters!</div>
            </div>

            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>

            </div>
            <br>

            <div style="text-align:center">
              <span class="dot" onclick="currentSlide(1)"></span>
              <span class="dot" onclick="currentSlide(2)"></span>
              <span class="dot" onclick="currentSlide(3)"></span>
            </div>

            <script>
            var slideIndex = 1;
            showSlides(slideIndex);

            function plusSlides(n) {
              showSlides(slideIndex += n);
            }

            function currentSlide(n) {
              showSlides(slideIndex = n);
            }

            function showSlides(n) {
              var i;
              var slides = document.getElementsByClassName("mySlides");
              var dots = document.getElementsByClassName("dot");
              if (n > slides.length) {slideIndex = 1}
              if (n < 1) {slideIndex = slides.length}
              for (i = 0; i < slides.length; i++) {
                  slides[i].style.display = "none";
              }
              for (i = 0; i < dots.length; i++) {
                  dots[i].className = dots[i].className.replace(" active", "");
              }
              slides[slideIndex-1].style.display = "block";
              dots[slideIndex-1].className += " active";
            }
            </script>
